name: dispatch

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: dispatch
      POSTGRES_USER: ${POSTGRES_USER:-dispatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dispatch}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
